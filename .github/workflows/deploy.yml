name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # We do NOT need a separate Node.js setup or React build step!
      # The pom.xml is already configured with frontend-maven-plugin which 
      # automatically downloads Node, builds React, and copies the assets for us.
      - name: Build Full Application
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: workshop
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: target/*.jar
