server.port=8081

# Multipart configuration for handling file uploads up to 15MB
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Azure OpenAI Configuration
azure.openai.endpoint=https://elevorax.services.ai.azure.com
azure.openai.api.key=<PLACE YOUR API KEY>

azure.openai.chat.deployment=gpt-5-mini
azure.openai.embedding.deployment=text-embedding-3-small
azure.openai.api.version=2024-02-15-preview
